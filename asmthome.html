<!DOCTYPE html>
<html>
<head>

<title>Login / Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#111;
color:white;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card bg-dark text-white p-3">

<h4 class="text-center">Login</h4>

<form id="loginForm">

<input class="form-control mb-3" placeholder="Email">

<input type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-warning w-100">Login</button>

<p class="text-center mt-3">
Don't have account?
<a href="#" onclick="showSignup()">Sign Up</a>
</p>

</form>


<form id="signupForm" style="display:none">

<h4 class="text-center">Sign Up</h4>

<input class="form-control mb-3" placeholder="Username">

<input class="form-control mb-3" placeholder="Email">

<input type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-warning w-100">Create Account</button>

<p class="text-center mt-3">
Already have account?
<a href="#" onclick="showLogin()">Login</a>
</p>

</form>

</div>

</div>

</div>

</div>


<script>

function showSignup(){
document.getElementById("loginForm").style.display="none";
document.getElementById("signupForm").style.display="block";
}

function showLogin(){
document.getElementById("signupForm").style.display="none";
document.getElementById("loginForm").style.display="block";
}

</script>

</body>
</html>
